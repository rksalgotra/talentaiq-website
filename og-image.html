<!DOCTYPE html>
<html><head><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:linear-gradient(135deg,#312E81,#4F46E5 50%,#6366F1);font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;color:white}
.card{text-align:center;max-width:900px}
.logo{width:64px;height:64px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;margin-bottom:24px}
h1{font-size:48px;font-weight:800;letter-spacing:-1px;margin-bottom:16px}
p{font-size:22px;opacity:.85;line-height:1.5;margin-bottom:32px}
.pills{display:flex;gap:12px;justify-content:center}
.pill{padding:8px 20px;border-radius:999px;font-size:14px;font-weight:600;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2)}
.url{margin-top:32px;font-size:16px;opacity:.5;letter-spacing:1px}
</style></head><body>
<div class="card">
<div class="logo">T</div>
<h1>TalentAIQ</h1>
<p>AI-powered hiring decisions you can<br>explain, audit, and defend.</p>
<div class="pills">
<span class="pill">Find</span>
<span class="pill">Hire</span>
<span class="pill">Grow</span>
</div>
<div class="url">talentaiq.in</div>
</div>
</body></html>
